<div class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div class="search-box w-50">
      <input
        type="text"
        class="form-control"
        placeholder="Buscar por nombre o usuario..."
        (keyup)="filtrarUsuarios($event)"
      />
    </div>
    <button class="btn btn-primary" (click)="abrirModalNuevo(modalUser)">
      <i class="bi bi-person-plus"></i> Nuevo Usuario
    </button>
  </div>

  <div *ngIf="isLoading" class="text-center my-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p>Cargando personal...</p>
  </div>

  <div class="card shadow-sm" *ngIf="!isLoading">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Personal</th>
              <th>Usuario</th>
              <th>Documento</th>
              <th>Rol</th>
              <th>Estado</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let user of listaFiltrada">
              <td>
                <div class="fw-bold">{{ user.name }} {{ user.lastName }}</div>
                <small class="text-muted">{{ user.email }}</small>
              </td>
              <td>
                <span class="badge bg-secondary">{{ user.userName }}</span>
              </td>
              <td>{{ user.document }}</td>
              <td>
                <span class="badge border text-dark">{{ user.role }}</span>
              </td>
              <td>
                <span class="badge" [ngClass]="user.status ? 'bg-success' : 'bg-danger'">
                  {{ user.status ? 'Activo' : 'Inactivo' }}
                </span>
              </td>
              <td class="text-center">
                <button class="btn btn-sm btn-outline-primary" (click)="gestionarGeovalla(user)">
                  <i class="bi bi-geo-alt"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<ng-template #modalUser let-modal>
  <div class="modal-header bg-light">
    <h5 class="modal-title fw-bold">Registrar Nuevo Usuario</h5>
    <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
  </div>
  <div class="modal-body">
    <form [formGroup]="userForm">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label small fw-bold">Nombre</label>
          <input type="text" class="form-control" formControlName="name" placeholder="Ej: Juan">
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-bold">Apellido</label>
          <input type="text" class="form-control" formControlName="lastName" placeholder="Ej: Pérez">
        </div>

        <div class="col-md-6">
          <label class="form-label small fw-bold">Documento</label>
          <input type="number" class="form-control" formControlName="document" placeholder="C.C.">
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-bold">Teléfono</label>
          <input type="number" class="form-control" formControlName="phone" placeholder="Ej: 3001234567">
        </div>

        <div class="col-md-6">
          <label class="form-label small fw-bold">Nombre de Usuario</label>
          <input type="text" class="form-control" formControlName="userName" placeholder="Ej: jperez">
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-bold">Contraseña</label>
          <input type="password" class="form-control" formControlName="password" placeholder="Mín. 6 caracteres">
        </div>

        <div class="col-md-12">
          <label class="form-label small fw-bold">Correo Electrónico</label>
          <input type="email" class="form-control" formControlName="email" placeholder="juan@scrappi.com">
        </div>

        <div class="col-md-6">
          <label class="form-label small fw-bold">Rol en el Sistema</label>
          <select class="form-select" formControlName="role">
            <option value="EMPLOYED">Empleado</option>
            <option value="ADMIN">Administrador</option>
            <option value="SUPERVISOR">Supervisor</option>
          </select>
        </div>
        <div class="col-md-6 d-flex align-items-end pb-2">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="statusSwitch" formControlName="status">
            <label class="form-check-label small fw-bold" for="statusSwitch">Usuario Activo</label>
          </div>
        </div>
      </div>
    </form>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-outline-secondary" (click)="modal.dismiss()">Cancelar</button>
    <button type="button" class="btn btn-primary px-4" (click)="guardarNuevoUsuario()" [disabled]="userForm.invalid">
      <i class="bi bi-save me-1"></i> Guardar Usuario
    </button>
  </div>
</ng-template>
