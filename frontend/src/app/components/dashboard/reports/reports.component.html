<div class="container-fluid p-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold text-dark mb-1">Reportes de Asistencia</h2>
      <p class="text-muted small">Generación de históricos para auditoría de nómina.</p>
    </div>
    <button class="btn btn-outline-success rounded-pill px-4 shadow-sm">
      <i class="bi bi-file-earmark-excel me-2"></i>Exportar Excel
    </button>
  </div>

  <div class="card border-0 shadow-sm p-3 mb-4" style="border-radius: 15px">
    <div class="row g-3 align-items-end">
      <div class="col-md-3">
        <label class="form-label small fw-bold">Fecha Inicio</label>
        <input type="date" class="form-control" />
      </div>
      <div class="col-md-3">
        <label class="form-label small fw-bold">Fecha Fin</label>
        <input type="date" class="form-control" />
      </div>
      <div class="col-md-4">
        <label class="form-label small fw-bold">Filtrar por Empleado</label>
        <select class="form-select">
          <option value="">Todos los empleados</option>
          <option *ngFor="let emp of listaEmpleados" [value]="emp.codigo">
            {{ emp.nombre }}
          </option>
        </select>
      </div>
      <div class="col-md-2">
        <button class="btn btn-primary w-100 rounded-pill">Generar</button>
      </div>
    </div>
  </div>

  <div class="card border-0 shadow-sm overflow-hidden" style="border-radius: 15px">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="bg-light">
          <tr class="small text-uppercase text-muted">
            <th class="ps-4">Fecha</th>
            <th>Empleado</th>
            <th>Entrada</th>
            <th>Salida</th>
            <th>Ubicación</th>
            <th class="text-center">Estado Geovalla</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="ps-4">08/03/2026</td>
            <td class="fw-bold">Jhon Mendoza</td>
            <td>07:13 AM</td>
            <td>05:00 PM</td>
            <td><small>6.1440, -75.6150</small></td>
            <td class="text-center">
              <span class="badge bg-success-subtle text-success rounded-pill px-3">CUMPLIDO</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
